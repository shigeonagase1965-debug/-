<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あすなろ興産 公開AI体験版</title>

<style>
body{
  font-family:Meiryo,sans-serif;
  background:#f4f7f5;
  margin:0;
  color:#222;
  line-height:1.7;
}
header{
  background:#0b7a3b;
  color:white;
  text-align:center;
  padding:35px 20px;
}
.container{
  max-width:850px;
  margin:auto;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  margin-bottom:18px;
  box-shadow:0 3px 10px rgba(0,0,0,0.12);
}
.notice{
  background:#fff7d6;
  border-left:6px solid #ffcc00;
}
select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  background:#0b7a3b;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
button:disabled{
  background:#999;
}
.voice-btn{
  background:#0066cc;
}
.mic-btn{
  background:#cc6600;
}
#chat{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.user{
  align-self:flex-end;
  background:#95ec69;
  padding:12px;
  border-radius:15px;
  max-width:75%;
}
.ai{
  align-self:flex-start;
  background:white;
  padding:12px;
  border-radius:15px;
  max-width:75%;
  border:1px solid #ddd;
}
.name{
  font-size:12px;
  color:#666;
  margin-bottom:5px;
}
.status{
  font-size:14px;
  color:#555;
  margin-top:10px;
}
footer{
  text-align:center;
  padding:25px;
  color:#666;
}
</style>
</head>

<body>

<header>
  <h1>あすなろ興産 公開AI体験版</h1>
  <p>マコト・ミサト・アカネと会話できます</p>
</header>

<div class="container">

  <div class="card notice">
    <p>
      これは試験公開版です。文字入力・簡易音声読み上げ・マイク入力に対応しています。
      個人情報、医療・法律・緊急相談は入力しないでください。
    </p>
  </div>

  <div class="card">
    <h2>AIキャラクター選択</h2>

    <select id="character">
      <option value="makoto">マコト：愚痴聞き・ストレス解消</option>
      <option value="misato">ミサト：励まし・応援</option>
      <option value="akane">アカネ：雑談・暇つぶし</option>
    </select>

    <textarea id="msg" rows="4" placeholder="ここに話したいことを書いてください"></textarea>

    <button id="sendBtn" onclick="sendMsg()">送信</button>

    <button class="mic-btn" onclick="startVoiceInput()">
      マイクで話す
    </button>

    <button class="voice-btn" onclick="readLastReply()">
      最後の返答を音声で読む
    </button>

    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>会話</h2>
    <div id="chat"></div>
  </div>

</div>

<footer>
  <p>© あすなろ興産</p>
</footer>

<script>
let isProcessing = false;
let lastReply = "";

function getCharacterName(character){
  return {
    makoto:"マコト",
    misato:"ミサト",
    akane:"アカネ"
  }[character] || "AI";
}

function setStatus(text){
  document.getElementById("status").textContent = text || "";
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function addMessage(type, name, text){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = type;
  div.innerHTML = `<div class="name">${escapeHtml(name)}</div><div>${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function speakText(text){
  if(!text) return;

  if(!("speechSynthesis" in window)){
    alert("このブラウザは音声読み上げに対応していません。");
    return;
  }

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "ja-JP";
  utterance.rate = 1.0;
  utterance.pitch = 1.0;

  speechSynthesis.speak(utterance);
}

function readLastReply(){
  if(lastReply){
    speakText(lastReply);
  }else{
    speakText("まだAIの返答がありません。");
  }
}

function startVoiceInput(){
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("このブラウザは音声入力に対応していません。ChromeまたはEdgeで試してください。");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
  recognition.continuous = false;

  setStatus("録音中です。話してください。");

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    document.getElementById("msg").value = text;
    setStatus("音声入力しました。内容を確認して送信してください。");
  };

  recognition.onerror = function(event){
    setStatus("音声入力エラー: " + event.error);
  };

  recognition.onend = function(){
    if(document.getElementById("status").textContent === "録音中です。話してください。"){
      setStatus("音声入力を終了しました。");
    }
  };

  recognition.start();
}

async function sendMsg(){
  if(isProcessing) return;

  const msgBox = document.getElementById("msg");
  const message = msgBox.value.trim();
  const character = document.getElementById("character").value;
  const sendBtn = document.getElementById("sendBtn");

  if(!message){
    setStatus("メッセージを入力してください。");
    return;
  }

  isProcessing = true;
  sendBtn.disabled = true;
  setStatus("AIが返答を考えています。");

  addMessage("user", "あなた", message);
  msgBox.value = "";

  try{
    const res = await fetch("/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        message: message,
        character: character
      })
    });

    const data = await res.json();

    if(!res.ok){
      addMessage("ai", "エラー", data.error || "通信エラー");
      setStatus("エラーが発生しました。");
    }else{
      const reply = data.reply || "返答がありません";
      lastReply = reply;
      addMessage("ai", getCharacterName(character), reply);
      speakText(reply);
      setStatus("返答しました。");
    }

  }catch(err){
    addMessage("ai", "通信エラー", err.message);
    setStatus("通信エラーが発生しました。");
  }

  isProcessing = false;
  sendBtn.disabled = false;
}
</script>

</body>
</html>
