<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あすなろ興産 公開AI体験版</title>
<style>
body{font-family:Meiryo,sans-serif;background:#e5ddd5;margin:0;color:#222;}
header{background:#0b7a3b;color:white;text-align:center;padding:25px;}
.container{max-width:800px;margin:auto;padding:15px;}
.control,.notice{background:white;padding:15px;border-radius:12px;margin-bottom:15px;}
.notice{background:#fff7d6;}
select,textarea,button{width:100%;padding:12px;margin-top:10px;font-size:16px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box;}
button{background:#0b7a3b;color:white;border:none;cursor:pointer;font-weight:bold;}
button:disabled{background:#999;}
.voice{background:#0066cc;}
.mic{background:#cc6600;}
#status{margin-top:10px;color:#555;}
#chat{display:flex;flex-direction:column;gap:15px;}
.user{align-self:flex-end;background:#95ec69;padding:12px;border-radius:15px;max-width:75%;}
.ai{align-self:flex-start;background:white;padding:12px;border-radius:15px;max-width:75%;}
.name{font-size:12px;color:#666;margin-bottom:5px;}
</style>
</head>
<body>

<header>
  <h1>あすなろ興産 公開AI体験版</h1>
  <p>マコト・ミサト・アカネと会話できます</p>
</header>

<div class="container">

  <div class="notice">
    <p>
      これは試験公開版です。文字入力・マイク入力・音声読み上げに対応しています。
      個人情報、医療・法律・緊急相談は入力しないでください。
    </p>
  </div>

  <div class="control">
    <select id="character">
      <option value="makoto">マコト：愚痴聞き・ストレス解消</option>
      <option value="misato">ミサト：励まし・応援</option>
      <option value="akane">アカネ：雑談・暇つぶし</option>
    </select>

    <textarea id="msg" rows="4" placeholder="ここに話したいことを書いてください"></textarea>

    <button id="sendBtn" onclick="sendMsg()">送信</button>
    <button class="mic" onclick="startVoiceInput()">マイクで話す</button>
    <button class="voice" onclick="readLastReply()">最後の返答を音声で読む</button>

    <div id="status"></div>
  </div>

  <div id="chat"></div>

</div>

<script>
let isProcessing = false;
let lastReply = "";

function getCharacterName(character){
  return {
    makoto:"マコト",
    misato:"ミサト",
    akane:"アカネ"
  }[character] || "AI";
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function addMessage(type, name, text){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = type;
  div.innerHTML =
    '<div class="name">' + escapeHtml(name) + '</div><div>' + escapeHtml(text) + '</div>';
  chat.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function speakText(text){
  if(!text) return;
  if(!("speechSynthesis" in window)){
    alert("このブラウザは音声読み上げに対応していません。");
    return;
  }
  speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "ja-JP";
  speech.rate = 1.0;
  speech.pitch = 1.0;
  speechSynthesis.speak(speech);
}

function readLastReply(){
  if(lastReply){
    speakText(lastReply);
  }else{
    speakText("まだAIの返答がありません。");
  }
}

function startVoiceInput(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("このブラウザでは音声入力できません。ChromeまたはEdgeで試してください。");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "ja-JP";
  rec.interimResults = false;
  rec.continuous = false;

  document.getElementById("status").textContent = "録音中です。話してください。";

  rec.onresult = function(e){
    const text = e.results[0][0].transcript;
    document.getElementById("msg").value = text;
    document.getElementById("status").textContent = "音声入力しました。内容を確認して送信してください。";
  };

  rec.onerror = function(e){
    document.getElementById("status").textContent = "音声入力エラー: " + e.error;
  };

  rec.start();
}

async function sendMsg(){
  if(isProcessing) return;

  const msgBox = document.getElementById("msg");
  const message = msgBox.value.trim();
  const character = document.getElementById("character").value;
  const sendBtn = document.getElementById("sendBtn");

  if(!message){
    document.getElementById("status").textContent = "メッセージを入力してください。";
    return;
  }

  isProcessing = true;
  sendBtn.disabled = true;
  document.getElementById("status").textContent = "AIが返答を考えています。";

  addMessage("user", "あなた", message);
  msgBox.value = "";

  try{
    const res = await fetch("/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        message: message,
        character: character
      })
    });

    const data = await res.json();

    if(!res.ok){
      addMessage("ai", "エラー", data.error || "通信エラー");
      document.getElementById("status").textContent = "エラーが発生しました。";
    }else{
      const reply = data.reply || "返答がありません";
      lastReply = reply;
      addMessage("ai", getCharacterName(character), reply);
      speakText(reply);
      document.getElementById("status").textContent = "返答しました。";
    }

  }catch(err){
    addMessage("ai", "通信エラー", err.message);
    document.getElementById("status").textContent = "通信エラーが発生しました。";
  }

  isProcessing = false;
  sendBtn.disabled = false;
}
</script>

</body>
</html>
